name: nooti_app
description: A powerful note-taking app with password protection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^16.3.0
  path_provider: ^2.1.1
  sqflite: ^2.3.2
  intl: ^0.18.1
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/